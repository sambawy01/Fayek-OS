name: Staging deploy + smoke

# Every push to `staging` builds and deploys a Vercel PREVIEW, then smoke-tests
# /api/health against it. Green here = safe to promote to production (run the
# "Promote staging → production" workflow).
#
# Requires two repo secrets:
#   VERCEL_TOKEN                     — Vercel account token (Account → Settings → Tokens)
#   VERCEL_AUTOMATION_BYPASS_SECRET  — from Vercel → Settings → Deployment Protection
#                                      → "Protection Bypass for Automation" (lets the
#                                      smoke test reach the protected preview URL)
on:
  push:
    branches: [staging]

jobs:
  deploy-smoke:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_SXTsdQkGWcYVqG6mDLMi9Jv4
      VERCEL_PROJECT_ID: prj_WuOTprLgJT7huea8vH5tEXMytEYI
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Build & deploy preview
        id: deploy
        run: |
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Staging preview: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Smoke /api/health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          for i in $(seq 1 12); do
            code=$(curl -s -o /tmp/h.json -w "%{http_code}" --max-time 20 \
              -H "x-vercel-protection-bypass: $BYPASS" \
              -H "x-vercel-set-bypass-cookie: true" \
              "$URL/api/health" || echo 000)
            echo "[$i] $code $(cat /tmp/h.json 2>/dev/null)"
            if [ "$code" = "200" ]; then echo "✓ staging healthy — safe to promote"; exit 0; fi
            sleep 10
          done
          echo "::error::staging /api/health never returned 200"
          exit 1
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
